source = ~/.config/colors/hypr-colors.conf

general {
    gaps_in = 2
    gaps_out = 4
    border_size = 2
    col.active_border = $blue
    allow_tearing = true
    layout = dwindle
    resize_on_border = true
}

misc {
    font_family = "JetBrainsMono Nerd Font Propo"
    disable_hyprland_logo = true
    #TODO: Does not work for ghostty... investigate
    #TODO: Check if it can conditionally not swallow
    #	enable_swallow = true
    #swallow_regex = ^(ghostty|Alacritty)$
}

render {
   direct_scanout = 1
}

