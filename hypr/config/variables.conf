source = ~/.config/colors/hypr-colors.conf

general {
    gaps_in = 2
    gaps_out = 4
    border_size = 2
    col.active_border = $blue
    # TODO: Investigate
    allow_tearing = false
    layout = dwindle
    resize_on_border = true

    snap {
        enabled = true
    }
}

#TODO: What do those do?
# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

misc {
    font_family = "JetBrainsMono Nerd Font Propo"
    disable_hyprland_logo = true
    #TODO: investigate vrr and other misc	

    # https://wiki.hyprland.org/Configuring/Variables/#misc
    #vrr = 2
    #TODO: Does not work for ghostty... investigate
    #TODO: Check if it can conditionally not swallow
    #	enable_swallow = true
    #swallow_regex = ^(ghostty|Alacritty)$
}

render {
   direct_scanout = 1
}

